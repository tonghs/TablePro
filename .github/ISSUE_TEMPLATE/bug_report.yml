name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open a MySQL connection
        2. Run a SELECT query
        3. Click on a cell to edit
        4. ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: dropdown
    id: database
    attributes:
      label: Database type
      options:
        - MySQL / MariaDB
        - PostgreSQL
        - SQLite
        - SQL Server
        - MongoDB
        - Redis
        - ClickHouse
        - Oracle
        - N/A
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: TablePro version
      placeholder: "0.16.0"
    validations:
      required: false

  - type: input
    id: macos
    attributes:
      label: macOS version & chip
      placeholder: "macOS 15.3 / Apple Silicon"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, screen recordings, or crash logs.
    validations:
      required: false
